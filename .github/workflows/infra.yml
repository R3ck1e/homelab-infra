name: Terraform

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:

  validate:
    name: Terraform Validate
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Init (no backend)
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate


  plan:
    name: Terraform Plan
    runs-on: self-hosted
    needs: validate
    if: github.event_name == 'pull_request'

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Prepare Terraform workspace
        run: |
          sudo chown -R "$(id -un):$(id -gn)" "$GITHUB_WORKSPACE"
          rm -f "$GITHUB_WORKSPACE/terraform/terraform.tfstate"
          rm -f "$GITHUB_WORKSPACE/terraform/.terraform/terraform.tfstate"
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init -reconfigure

      - name: Terraform Plan
        run: terraform plan -no-color


  apply:
    name: Terraform Apply
    runs-on: self-hosted
    needs: validate
    if: github.event_name == 'push'

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Prepare Terraform workspace
        run: |
          sudo chown -R "$(id -un):$(id -gn)" "$GITHUB_WORKSPACE"
          rm -f "$GITHUB_WORKSPACE/terraform/terraform.tfstate"
          rm -f "$GITHUB_WORKSPACE/terraform/.terraform/terraform.tfstate"
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init -reconfigure

      - name: Terraform Apply
        run: terraform apply -auto-approve
